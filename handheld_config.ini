# melonDS Handheld Configuration
# Optimized for ARM64 gaming handheld with 1GB RAM
# Place this file in ~/.config/melonDS/ or next to the melonDS binary

[Emu]
# Limit CPU usage and framerate for better performance
LimitFPS=1
# Target 30 FPS for smooth performance on limited hardware
MaxFPS=30
# Use frame skipping to maintain speed
FrameSkip=1

[3D]
# Use software renderer for compatibility and lower memory usage
Renderer=0
# Disable anti-aliasing to save performance
AntiAliasing=0
# Use lower resolution for 3D rendering
HiResolution=0

[Audio]
# Reduce audio buffer size for lower latency and memory usage
BufferSize=512
# Use lower sample rate if supported
SampleRate=32000

[Screen]
# Use integer scaling for better performance
IntegerScaling=1
# Limit screen scaling to reduce memory and GPU load
ScreenSizing=1
# Keep screens close together to use less screen space
ScreenGap=0
# Use linear filtering for smoother scaling
FilterMode=1

[Input]
# Reduce input polling for lower CPU usage
JoystickID=0

[Wifi]
# Disable WiFi emulation to save memory and CPU
WifiMode=0

[General]
# Save battery by reducing unnecessary features
SavestateRelocSRAM=0
# Use faster but less accurate timing
ThreadedRendering=0